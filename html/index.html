<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CatPair — Mahjong Matching Game</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
}

body {
  background: #2c1e12;
  color: #f5e6d3;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* Background image layer */
#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image: url('assets/backgrounds/level1.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: brightness(0.35) blur(3px);
}

/* All visible content above background */
#game-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

h1 {
  font-size: clamp(0.9rem, 2.5vh, 1.6rem);
  margin: 0 0 2px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.7);
  letter-spacing: 0.04em;
}

#score-bar {
  font-size: clamp(0.7rem, 1.8vh, 0.95rem);
  margin-bottom: 4px;
  opacity: 0.85;
  text-shadow: 0 1px 3px rgba(0,0,0,0.7);
}

/* Settings bar */
#settings-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 6px;
  flex-wrap: wrap;
  justify-content: center;
  font-size: clamp(0.65rem, 1.6vh, 0.85rem);
}

.btn-group {
  display: flex;
  align-items: center;
  gap: 2px;
}

.btn-group-label {
  margin-right: 4px;
  opacity: 0.7;
  font-size: 0.85em;
}

.btn-group button {
  padding: 3px 10px;
  border: 1px solid rgba(245,230,211,0.3);
  background: rgba(44,30,18,0.6);
  color: #f5e6d3;
  font-size: inherit;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}

.btn-group button:first-of-type {
  border-radius: 4px 0 0 4px;
}

.btn-group button:last-of-type {
  border-radius: 0 4px 4px 0;
}

.btn-group button.active {
  background: rgba(212,164,74,0.5);
  border-color: #d4a44a;
  color: #fff;
}

.btn-group button:hover:not(.active) {
  background: rgba(212,164,74,0.2);
}

#new-game-btn {
  padding: 3px 14px;
  border: 1px solid rgba(212,164,74,0.6);
  background: rgba(212,164,74,0.25);
  color: #f5e6d3;
  font-size: inherit;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.15s;
  margin-left: 4px;
}

#new-game-btn:hover {
  background: rgba(212,164,74,0.45);
}

/* Loading indicator */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 40px;
}
#loading .spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(245,230,211,0.2);
  border-top-color: #f5e6d3;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Board — absolute positioning for stacked layers */
#board {
  position: relative;
}

.tile {
  position: absolute;
  width: var(--tile-size);
  height: var(--tile-size);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.4s ease;
  border-radius: calc(var(--tile-size) * 0.0625);
  user-select: none;
  -webkit-user-select: none;
}
.tile img {
  width: 100%;
  height: 100%;
  display: block;
  pointer-events: none;
  border-radius: calc(var(--tile-size) * 0.0625);
}
.tile:hover { transform: scale(1.04); }
.tile.selected {
  transform: scale(1.08);
  box-shadow: 0 0 calc(var(--tile-size) * 0.11) calc(var(--tile-size) * 0.03) rgba(255, 200, 50, 0.8),
              0 0 calc(var(--tile-size) * 0.23) calc(var(--tile-size) * 0.06) rgba(255, 160, 20, 0.4);
}
.tile.matched {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.8);
}
.tile.hidden {
  visibility: hidden;
  pointer-events: none;
}
.tile.blocked {
  pointer-events: none;
  cursor: default;
  filter: brightness(0.55);
}
.tile.blocked:hover {
  transform: none;
}

/* Win overlay */
#win-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44, 30, 18, 0.92);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
#win-overlay.show { display: flex; }
#win-overlay h2 {
  font-size: 2.4rem;
  text-shadow: 0 0 20px rgba(255,200,50,0.6);
}
#win-overlay p { font-size: 1.1rem; opacity: 0.8; }
#play-again {
  padding: 14px 36px;
  font-size: 1.1rem;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #d4a44a, #b8832e);
  color: #2c1e12;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s;
}
#play-again:hover { transform: scale(1.06); }

/* Particle canvas */
#particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
}
</style>
</head>
<body>

<div id="bg"></div>

<div id="game-wrap">
  <h1>CatPair</h1>
  <div id="score-bar">Matches: <span id="match-count">0</span> / <span id="total-pairs">0</span></div>

  <div id="settings-bar">
    <div class="btn-group">
      <span class="btn-group-label">Grid:</span>
      <button data-setting="baseSize" data-value="6" class="active">6&#xd7;6</button>
      <button data-setting="baseSize" data-value="8">8&#xd7;8</button>
      <button data-setting="baseSize" data-value="10">10&#xd7;10</button>
    </div>
    <div class="btn-group">
      <span class="btn-group-label">Depth:</span>
      <button data-setting="mode" data-value="flat">Flat</button>
      <button data-setting="mode" data-value="stacked" class="active">Stacked</button>
    </div>
    <button id="new-game-btn">New Game</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div>Loading cat tiles&hellip;</div>
  </div>

  <div id="board"></div>
</div>

<canvas id="particles"></canvas>

<div id="win-overlay">
  <h2>You Win!</h2>
  <p>All cats matched in <span id="final-moves">0</span> moves</p>
  <button id="play-again">Play Again</button>
</div>

<script>
(function() {
  'use strict';

  // ── Config ──
  const HEADER_PX = 80; // reserved for h1 + score bar + settings bar
  const DEPTH_SHIFT_FACTOR = 0.03; // multiplied by tileSize for 3D offset

  let gameConfig = { baseSize: 6, mode: 'stacked' };

  // ── State ──
  let tiles = [];          // all tile objects: { id, hx, hy, z, tileName, matched, el }
  let totalPairs = 0;
  let selected = null;     // tile id or null
  let isProcessing = false;
  let matchCount = 0;
  let moves = 0;
  let audioCtx = null;
  let currentTileSize = 64;

  // ── DOM refs ──
  const boardEl = document.getElementById('board');
  const loadingEl = document.getElementById('loading');
  const matchCountEl = document.getElementById('match-count');
  const totalPairsEl = document.getElementById('total-pairs');
  const winOverlay = document.getElementById('win-overlay');
  const finalMovesEl = document.getElementById('final-moves');
  const playAgainBtn = document.getElementById('play-again');
  const newGameBtn = document.getElementById('new-game-btn');

  // ── Settings bar ──
  document.querySelectorAll('#settings-bar .btn-group button').forEach(btn => {
    btn.addEventListener('click', () => {
      const setting = btn.dataset.setting;
      const value = btn.dataset.value;
      // Toggle active in group
      btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (setting === 'baseSize') gameConfig.baseSize = parseInt(value);
      else if (setting === 'mode') gameConfig.mode = value;
    });
  });

  newGameBtn.addEventListener('click', () => {
    winOverlay.classList.remove('show');
    loadingEl.style.display = 'flex';
    startGame();
  });

  // ── Dynamic tile sizing ──
  function recalcTileSize() {
    const B = gameConfig.baseSize;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const availW = vw - 16;
    const availH = vh - HEADER_PX - 16;

    const tileFromW = Math.floor(availW / B);
    const tileFromH = Math.floor(availH / B);
    const tileSize = Math.max(24, Math.min(tileFromW, tileFromH, 128));

    currentTileSize = tileSize;
    document.documentElement.style.setProperty('--tile-size', tileSize + 'px');

    // Reposition all tiles
    repositionTiles(tileSize);
    resizeBoardContainer(tileSize);
    return tileSize;
  }

  function resizeBoardContainer(tileSize) {
    const B = gameConfig.baseSize;
    const depthShift = tileSize * DEPTH_SHIFT_FACTOR;
    const numLayers = gameConfig.mode === 'stacked' ? 5 : 1;
    const maxZ = numLayers - 1;
    // Board footprint: base layer covers B tiles, higher layers add small offset
    const basePixels = B * tileSize;
    const extraShift = maxZ * depthShift;
    boardEl.style.width = (basePixels + extraShift) + 'px';
    boardEl.style.height = (basePixels + extraShift) + 'px';
  }

  function repositionTiles(tileSize) {
    const halfTile = tileSize / 2;
    const depthShift = tileSize * DEPTH_SHIFT_FACTOR;
    for (const t of tiles) {
      if (!t.el) continue;
      t.el.style.left = (t.hx * halfTile + t.z * depthShift) + 'px';
      t.el.style.top = (t.hy * halfTile - t.z * depthShift) + 'px';
      t.el.style.zIndex = t.z * 100 + t.id;
    }
  }

  recalcTileSize();
  window.addEventListener('resize', recalcTileSize);

  // ── Particle canvas ──
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let animating = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ── Audio ──
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  const successChords = [
    [523.25, 659.25, 783.99],
    [587.33, 739.99, 880.00],
    [659.25, 830.61, 987.77],
    [698.46, 880.00, 1046.50],
    [783.99, 987.77, 1174.66],
  ];

  function playSuccess() {
    ensureAudio();
    const t = audioCtx.currentTime;
    const chord = successChords[Math.floor(Math.random() * successChords.length)];

    chord.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      const onset = t + i * 0.07;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, onset + 0.02);
      gain.gain.setValueAtTime(0.18, onset + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, onset + 0.6);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(onset);
      osc.stop(onset + 0.65);
    });

    const shimmer = audioCtx.createOscillator();
    const sGain = audioCtx.createGain();
    shimmer.type = 'triangle';
    shimmer.frequency.setValueAtTime(chord[2] * 2, t);
    sGain.gain.setValueAtTime(0, t);
    sGain.gain.linearRampToValueAtTime(0.06, t + 0.15);
    sGain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    shimmer.connect(sGain);
    sGain.connect(audioCtx.destination);
    shimmer.start(t + 0.1);
    shimmer.stop(t + 0.85);
  }

  function playFail() {
    ensureAudio();
    const t = audioCtx.currentTime;

    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = 'square';
    osc1.frequency.setValueAtTime(185, t);
    osc1.frequency.linearRampToValueAtTime(140, t + 0.35);
    gain1.gain.setValueAtTime(0.12, t);
    gain1.gain.linearRampToValueAtTime(0.12, t + 0.2);
    gain1.gain.linearRampToValueAtTime(0, t + 0.4);
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.start(t);
    osc1.stop(t + 0.45);

    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(195, t);
    osc2.frequency.linearRampToValueAtTime(148, t + 0.35);
    gain2.gain.setValueAtTime(0.07, t);
    gain2.gain.linearRampToValueAtTime(0.07, t + 0.2);
    gain2.gain.linearRampToValueAtTime(0, t + 0.4);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(t);
    osc2.stop(t + 0.45);

    const bufLen = Math.floor(audioCtx.sampleRate * 0.15);
    const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 600;
    bp.Q.value = 2;
    const nGain = audioCtx.createGain();
    nGain.gain.setValueAtTime(0.08, t);
    nGain.gain.linearRampToValueAtTime(0, t + 0.2);
    noise.connect(bp);
    bp.connect(nGain);
    nGain.connect(audioCtx.destination);
    noise.start(t);
  }

  // ── Particles ──
  const starColors = ['#FFD700', '#FFA500', '#FF8C00', '#FFE066', '#FFC04D'];

  function spawnBurst(x, y) {
    for (let i = 0; i < 15; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 80 + Math.random() * 160;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 60,
        size: 3 + Math.random() * 5,
        color: starColors[Math.floor(Math.random() * starColors.length)],
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        spin: Math.random() * Math.PI * 2,
        spinRate: (Math.random() - 0.5) * 8,
      });
    }
    if (!animating) {
      animating = true;
      requestAnimationFrame(animateParticles);
    }
  }

  function drawStar(cx, cy, r, rotation, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.translate(cx, cy);
    ctx.rotate(rotation);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  let lastTime = 0;
  function animateParticles(timestamp) {
    const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0.016;
    lastTime = timestamp;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.spin += p.spinRate * dt;
      p.life -= p.decay;

      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }

      drawStar(p.x, p.y, p.size, p.spin, p.color, p.life);
    }

    if (particles.length > 0) {
      requestAnimationFrame(animateParticles);
    } else {
      animating = false;
      lastTime = 0;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  // ── Utilities ──
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function tileCenterViewport(el) {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  // ── Layout Generator ──
  // Generates all positions for the board.
  // Each position: { hx, hy, z }
  function generateLayout(baseSize, numLayers) {
    const positions = [];
    for (let z = 0; z < numLayers; z++) {
      let size, offsetX, offsetY;
      if (z === 0 || z === 2) {
        size = baseSize;
        offsetX = 0;
        offsetY = 0;
      } else if (z === 1 || z === 3) {
        size = baseSize - 1;
        offsetX = 1;
        offsetY = 1;
      } else {
        // z === 4 (top layer)
        size = baseSize - 2;
        offsetX = 2;
        offsetY = 2;
      }
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          positions.push({
            hx: 2 * c + offsetX,
            hy: 2 * r + offsetY,
            z: z
          });
        }
      }
    }
    return positions;
  }

  // ── Overlap check ──
  function tilesOverlap(hx1, hy1, hx2, hy2) {
    return Math.abs(hx1 - hx2) < 2 && Math.abs(hy1 - hy2) < 2;
  }

  // ── Solvable Board Generation ──
  // Forward-placement: place pairs of tiles from top to bottom,
  // ensuring each pair is placed in "exposed" positions.
  // The solution order is the reverse of placement order.
  function generateSolvableBoard(positions, allTileNames) {
    const maxAttempts = 50;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const result = tryGenerateBoard(positions, allTileNames);
      if (result) return result;
    }
    // Fallback: random assignment (shouldn't happen with our geometries)
    console.warn('Solvable generation failed, using random assignment');
    return randomFallback(positions, allTileNames);
  }

  function tryGenerateBoard(positions, allTileNames) {
    const totalPositions = positions.length;
    if (totalPositions % 2 !== 0) return null; // need even count

    const numPairs = totalPositions / 2;

    // Track which positions are filled
    const filled = new Array(totalPositions).fill(false);

    // Build index structures for quick lookup
    // positions indexed by their index
    const posById = positions.map((p, i) => ({ ...p, idx: i }));

    // For each position, precompute which positions on the layer below overlap it
    const supportMap = new Array(totalPositions).fill(null).map(() => []);
    for (let i = 0; i < totalPositions; i++) {
      if (positions[i].z === 0) continue;
      for (let j = 0; j < totalPositions; j++) {
        if (positions[j].z === positions[i].z - 1) {
          if (tilesOverlap(positions[i].hx, positions[i].hy, positions[j].hx, positions[j].hy)) {
            supportMap[i].push(j);
          }
        }
      }
    }

    // For each position, precompute which positions on the layer above overlap it
    const aboveMap = new Array(totalPositions).fill(null).map(() => []);
    for (let i = 0; i < totalPositions; i++) {
      for (let j = 0; j < totalPositions; j++) {
        if (positions[j].z > positions[i].z) {
          if (tilesOverlap(positions[i].hx, positions[i].hy, positions[j].hx, positions[j].hy)) {
            aboveMap[i].push(j);
          }
        }
      }
    }

    // Placement order: pairs placed in order, solution is reverse
    const placementOrder = []; // array of [idx1, idx2]

    for (let pairNum = 0; pairNum < numPairs; pairNum++) {
      // Find available positions: unfilled, supported (all overlapping below filled or layer 0)
      const available = [];
      for (let i = 0; i < totalPositions; i++) {
        if (filled[i]) continue;
        // Check support
        if (positions[i].z === 0) {
          available.push(i);
        } else {
          const allSupported = supportMap[i].every(j => filled[j]);
          if (allSupported) available.push(i);
        }
      }

      // Filter to exposed: no filled tile above
      const exposed = available.filter(i => {
        return !aboveMap[i].some(j => filled[j]);
      });

      if (exposed.length < 2) return null; // retry

      // Pick 2 random exposed positions
      shuffle(exposed);
      const idx1 = exposed[0];
      const idx2 = exposed[1];
      filled[idx1] = true;
      filled[idx2] = true;
      placementOrder.push([idx1, idx2]);
    }

    // Assign tile names: group into quads where possible
    const shuffledNames = shuffle([...allTileNames]);
    const tileAssignment = new Array(totalPositions).fill(null);

    let nameIdx = 0;
    // Process pairs in groups of 2 (quads of 4 tiles)
    for (let i = 0; i < placementOrder.length; i += 2) {
      const name = shuffledNames[nameIdx % shuffledNames.length];
      nameIdx++;

      tileAssignment[placementOrder[i][0]] = name;
      tileAssignment[placementOrder[i][1]] = name;

      if (i + 1 < placementOrder.length) {
        tileAssignment[placementOrder[i + 1][0]] = name;
        tileAssignment[placementOrder[i + 1][1]] = name;
      }
    }

    return { tileAssignment, placementOrder };
  }

  function randomFallback(positions, allTileNames) {
    const numPairs = positions.length / 2;
    const shuffledNames = shuffle([...allTileNames]);
    const deck = [];
    for (let i = 0; i < numPairs; i += 2) {
      const name = shuffledNames[(i / 2) % shuffledNames.length];
      deck.push(name, name, name, name);
    }
    // Trim to exact size
    while (deck.length > positions.length) deck.pop();
    // Ensure even
    while (deck.length < positions.length) {
      const name = shuffledNames[0];
      deck.push(name, name);
    }
    shuffle(deck);
    const tileAssignment = deck.slice(0, positions.length);
    return { tileAssignment, placementOrder: null };
  }

  // ── Exposure Check ──
  function isExposed(tile) {
    if (tile.matched) return false;
    for (const other of tiles) {
      if (other.matched || other.z <= tile.z) continue;
      if (Math.abs(other.hx - tile.hx) < 2 &&
          Math.abs(other.hy - tile.hy) < 2) return false;
    }
    return true;
  }

  function updateExposure() {
    for (const t of tiles) {
      if (t.matched) continue;
      const exposed = isExposed(t);
      t.el.classList.toggle('blocked', !exposed);
      // Ensure selected z-index boost for exposed tiles
      if (!exposed && t.el.classList.contains('selected')) {
        t.el.classList.remove('selected');
        if (selected === t.id) selected = null;
      }
    }
  }

  // ── Board Setup ──
  function buildBoard(allTileNames) {
    const B = gameConfig.baseSize;
    const numLayers = gameConfig.mode === 'stacked' ? 5 : 1;
    const positions = generateLayout(B, numLayers);

    // Ensure even number of positions
    if (positions.length % 2 !== 0) {
      positions.pop();
    }

    totalPairs = positions.length / 2;
    totalPairsEl.textContent = totalPairs;

    // Determine required unique tile names
    // With quad grouping: ~numPairs/2 unique names needed
    const uniqueNeeded = Math.ceil(totalPairs / 2);
    if (allTileNames.length < uniqueNeeded) {
      throw new Error(`Need at least ${uniqueNeeded} tiles, found ${allTileNames.length}`);
    }

    // Generate solvable board
    const { tileAssignment } = generateSolvableBoard(positions, allTileNames);

    // Collect unique tile names used
    const usedNames = new Set(tileAssignment);

    // Preload images
    const tileDir = 'assets/playtiles/';
    const preloaded = new Map();
    let loaded = 0;
    const total = usedNames.size;

    return new Promise((resolve) => {
      for (const name of usedNames) {
        const img = new Image();
        img.onload = img.onerror = () => {
          loaded++;
          if (loaded >= total) resolve();
        };
        img.src = tileDir + name;
        preloaded.set(name, img.src);
      }
    }).then(() => {
      loadingEl.style.display = 'none';
      boardEl.innerHTML = '';
      tiles = [];
      selected = null;
      isProcessing = false;
      matchCount = 0;
      moves = 0;
      matchCountEl.textContent = '0';

      const tileSize = recalcTileSize();
      const halfTile = tileSize / 2;
      const depthShift = tileSize * DEPTH_SHIFT_FACTOR;

      for (let i = 0; i < positions.length; i++) {
        const pos = positions[i];
        const name = tileAssignment[i];

        const div = document.createElement('div');
        div.className = 'tile';

        // Position
        div.style.left = (pos.hx * halfTile + pos.z * depthShift) + 'px';
        div.style.top = (pos.hy * halfTile - pos.z * depthShift) + 'px';
        div.style.zIndex = pos.z * 100 + i;

        // Depth shadow: stronger for higher layers
        const shadowBlur = 2 + pos.z * 1.5;
        const shadowSpread = 1 + pos.z * 0.5;
        const shadowAlpha = 0.3 + pos.z * 0.1;
        div.style.boxShadow = `${1 + pos.z * 0.5}px ${1 + pos.z * 0.5}px ${shadowBlur}px ${shadowSpread}px rgba(0,0,0,${shadowAlpha})`;

        const img = document.createElement('img');
        img.src = preloaded.get(name);
        img.alt = 'cat tile';
        img.draggable = false;
        div.appendChild(img);

        const tile = {
          id: i,
          hx: pos.hx,
          hy: pos.hy,
          z: pos.z,
          tileName: name,
          matched: false,
          el: div
        };

        div.addEventListener('click', () => onTileClick(tile));

        boardEl.appendChild(div);
        tiles.push(tile);
      }

      resizeBoardContainer(tileSize);
      updateExposure();
    });
  }

  // ── Click handler ──
  function onTileClick(tile) {
    if (isProcessing) return;
    if (tile.matched) return;
    if (!isExposed(tile)) return;

    if (selected === null) {
      selected = tile.id;
      tile.el.classList.add('selected');
      return;
    }

    if (selected === tile.id) {
      tile.el.classList.remove('selected');
      selected = null;
      return;
    }

    const first = tiles[selected];
    const second = tile;
    second.el.classList.add('selected');
    moves++;
    isProcessing = true;

    if (first.tileName === second.tileName) {
      playSuccess();

      const c1 = tileCenterViewport(first.el);
      const c2 = tileCenterViewport(second.el);
      spawnBurst(c1.x, c1.y);
      spawnBurst(c2.x, c2.y);

      setTimeout(() => {
        first.el.classList.remove('selected');
        second.el.classList.remove('selected');
        first.el.classList.add('matched');
        second.el.classList.add('matched');
        first.matched = true;
        second.matched = true;

        matchCount++;
        matchCountEl.textContent = matchCount;

        if (matchCount >= totalPairs) {
          setTimeout(() => showWin(), 500);
        }

        selected = null;
        isProcessing = false;
        updateExposure();
      }, 400);
    } else {
      playFail();

      setTimeout(() => {
        first.el.classList.remove('selected');
        second.el.classList.remove('selected');
        selected = null;
        isProcessing = false;
      }, 600);
    }
  }

  // ── Win screen ──
  function showWin() {
    finalMovesEl.textContent = moves;
    winOverlay.classList.add('show');
  }

  playAgainBtn.addEventListener('click', () => {
    winOverlay.classList.remove('show');
    loadingEl.style.display = 'flex';
    startGame();
  });

  // ── Init ──
  function startGame() {
    fetch('assets/playtiles/tilelist.json')
      .then(r => {
        if (!r.ok) throw new Error('Failed to load tilelist.json');
        return r.json();
      })
      .then(names => {
        return buildBoard(names);
      })
      .catch(err => {
        loadingEl.innerHTML = `<div style="color:#e66;">Error: ${err.message}</div>`;
        console.error(err);
      });
  }

  startGame();
})();
</script>
