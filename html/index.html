<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CatPair — Mahjong Matching Game</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
}

body {
  background: #2c1e12;
  color: #f5e6d3;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* Background image layer */
#bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image: url('assets/backgrounds/level1.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: brightness(0.35) blur(3px);
}

/* All visible content above background */
#game-wrap {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

h1 {
  font-size: clamp(0.9rem, 2.5vh, 1.6rem);
  margin: 0 0 2px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.7);
  letter-spacing: 0.04em;
}

#score-bar {
  font-size: clamp(0.7rem, 1.8vh, 0.95rem);
  margin-bottom: 4px;
  opacity: 0.85;
  text-shadow: 0 1px 3px rgba(0,0,0,0.7);
}

/* Loading indicator */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 40px;
}
#loading .spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(245,230,211,0.2);
  border-top-color: #f5e6d3;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Board — tile size driven by CSS custom property set from JS */
#board {
  display: grid;
  grid-template-columns: repeat(10, var(--tile-size));
  gap: var(--tile-gap);
}

.tile {
  width: var(--tile-size);
  height: var(--tile-size);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.4s ease;
  border-radius: calc(var(--tile-size) * 0.0625);
  user-select: none;
  -webkit-user-select: none;
}
.tile img {
  width: 100%;
  height: 100%;
  display: block;
  pointer-events: none;
  border-radius: calc(var(--tile-size) * 0.0625);
}
.tile:hover { transform: scale(1.04); }
.tile.selected {
  transform: scale(1.08);
  box-shadow: 0 0 calc(var(--tile-size) * 0.11) calc(var(--tile-size) * 0.03) rgba(255, 200, 50, 0.8),
              0 0 calc(var(--tile-size) * 0.23) calc(var(--tile-size) * 0.06) rgba(255, 160, 20, 0.4);
  z-index: 10;
}
.tile.matched {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.8);
}
.tile.hidden {
  visibility: hidden;
  pointer-events: none;
}

/* Win overlay */
#win-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44, 30, 18, 0.92);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
#win-overlay.show { display: flex; }
#win-overlay h2 {
  font-size: 2.4rem;
  text-shadow: 0 0 20px rgba(255,200,50,0.6);
}
#win-overlay p { font-size: 1.1rem; opacity: 0.8; }
#play-again {
  padding: 14px 36px;
  font-size: 1.1rem;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #d4a44a, #b8832e);
  color: #2c1e12;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s;
}
#play-again:hover { transform: scale(1.06); }

/* Particle canvas */
#particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
}
</style>
</head>
<body>

<div id="bg"></div>

<div id="game-wrap">
  <h1>CatPair</h1>
  <div id="score-bar">Matches: <span id="match-count">0</span> / 50</div>

  <div id="loading">
    <div class="spinner"></div>
    <div>Loading cat tiles&hellip;</div>
  </div>

  <div id="board"></div>
</div>

<canvas id="particles"></canvas>

<div id="win-overlay">
  <h2>You Win!</h2>
  <p>All cats matched in <span id="final-moves">0</span> moves</p>
  <button id="play-again">Play Again</button>
</div>

<script>
(function() {
  'use strict';

  // ── Constants ──
  const COLS = 10;
  const ROWS = 10;
  const HEADER_PX = 48; // reserved for h1 + score bar
  const MIN_GAP = 2;
  const MAX_GAP = 4;

  // ── State ──
  let tileNames = [];
  let grid = [];
  let selected = null;
  let isProcessing = false;
  let matchCount = 0;
  let moves = 0;
  let audioCtx = null;

  // ── DOM refs ──
  const boardEl = document.getElementById('board');
  const loadingEl = document.getElementById('loading');
  const matchCountEl = document.getElementById('match-count');
  const winOverlay = document.getElementById('win-overlay');
  const finalMovesEl = document.getElementById('final-moves');
  const playAgainBtn = document.getElementById('play-again');

  // ── Dynamic tile sizing ──
  function recalcTileSize() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const availW = vw - 8;  // small outer margin
    const availH = vh - HEADER_PX - 8;

    // Estimate gap, then compute tile size to fit both axes
    const gap = Math.max(MIN_GAP, Math.min(MAX_GAP, Math.floor(Math.min(vw, vh) * 0.004)));
    const totalGapW = gap * (COLS - 1);
    const totalGapH = gap * (ROWS - 1);

    const tileFromW = Math.floor((availW - totalGapW) / COLS);
    const tileFromH = Math.floor((availH - totalGapH) / ROWS);
    const tileSize = Math.max(24, Math.min(tileFromW, tileFromH, 128));

    document.documentElement.style.setProperty('--tile-size', tileSize + 'px');
    document.documentElement.style.setProperty('--tile-gap', gap + 'px');
    return tileSize;
  }
  recalcTileSize();
  window.addEventListener('resize', recalcTileSize);

  // ── Particle canvas ──
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let animating = false;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ── Audio ──
  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  // --- 5 success sounds: bright chime arpeggios using pentatonic notes ---
  const successChords = [
    [523.25, 659.25, 783.99],          // C5, E5, G5
    [587.33, 739.99, 880.00],          // D5, F#5, A5
    [659.25, 830.61, 987.77],          // E5, G#5, B5
    [698.46, 880.00, 1046.50],         // F5, A5, C6
    [783.99, 987.77, 1174.66],         // G5, B5, D6
  ];

  function playSuccess() {
    ensureAudio();
    const t = audioCtx.currentTime;
    const chord = successChords[Math.floor(Math.random() * successChords.length)];

    chord.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);

      // Stagger each note slightly for an arpeggio feel
      const onset = t + i * 0.07;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, onset + 0.02);
      gain.gain.setValueAtTime(0.18, onset + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, onset + 0.6);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(onset);
      osc.stop(onset + 0.65);
    });

    // Add a soft shimmer overtone
    const shimmer = audioCtx.createOscillator();
    const sGain = audioCtx.createGain();
    shimmer.type = 'triangle';
    shimmer.frequency.setValueAtTime(chord[2] * 2, t);
    sGain.gain.setValueAtTime(0, t);
    sGain.gain.linearRampToValueAtTime(0.06, t + 0.15);
    sGain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    shimmer.connect(sGain);
    sGain.connect(audioCtx.destination);
    shimmer.start(t + 0.1);
    shimmer.stop(t + 0.85);
  }

  // --- Fail sound: low buzzer with descending tone ---
  function playFail() {
    ensureAudio();
    const t = audioCtx.currentTime;

    // Main buzz
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = 'square';
    osc1.frequency.setValueAtTime(185, t);
    osc1.frequency.linearRampToValueAtTime(140, t + 0.35);
    gain1.gain.setValueAtTime(0.12, t);
    gain1.gain.linearRampToValueAtTime(0.12, t + 0.2);
    gain1.gain.linearRampToValueAtTime(0, t + 0.4);
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.start(t);
    osc1.stop(t + 0.45);

    // Dissonant second voice
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(195, t);
    osc2.frequency.linearRampToValueAtTime(148, t + 0.35);
    gain2.gain.setValueAtTime(0.07, t);
    gain2.gain.linearRampToValueAtTime(0.07, t + 0.2);
    gain2.gain.linearRampToValueAtTime(0, t + 0.4);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(t);
    osc2.stop(t + 0.45);

    // Noise burst
    const bufLen = Math.floor(audioCtx.sampleRate * 0.15);
    const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 600;
    bp.Q.value = 2;
    const nGain = audioCtx.createGain();
    nGain.gain.setValueAtTime(0.08, t);
    nGain.gain.linearRampToValueAtTime(0, t + 0.2);
    noise.connect(bp);
    bp.connect(nGain);
    nGain.connect(audioCtx.destination);
    noise.start(t);
  }

  // ── Particles ──
  const starColors = ['#FFD700', '#FFA500', '#FF8C00', '#FFE066', '#FFC04D'];

  function spawnBurst(x, y) {
    for (let i = 0; i < 15; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 80 + Math.random() * 160;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 60,
        size: 3 + Math.random() * 5,
        color: starColors[Math.floor(Math.random() * starColors.length)],
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        spin: Math.random() * Math.PI * 2,
        spinRate: (Math.random() - 0.5) * 8,
      });
    }
    if (!animating) {
      animating = true;
      requestAnimationFrame(animateParticles);
    }
  }

  function drawStar(cx, cy, r, rotation, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.translate(cx, cy);
    ctx.rotate(rotation);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  let lastTime = 0;
  function animateParticles(timestamp) {
    const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0.016;
    lastTime = timestamp;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 300 * dt;
      p.spin += p.spinRate * dt;
      p.life -= p.decay;

      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }

      drawStar(p.x, p.y, p.size, p.spin, p.color, p.life);
    }

    if (particles.length > 0) {
      requestAnimationFrame(animateParticles);
    } else {
      animating = false;
      lastTime = 0;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  // ── Fisher-Yates shuffle ──
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ── Get center of tile in viewport coords ──
  function tileCenterViewport(el) {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  // ── Board setup ──
  function buildBoard(allTileNames) {
    const shuffled = shuffle([...allTileNames]);
    const chosen = shuffled.slice(0, 25);
    tileNames = chosen;

    let deck = [];
    for (const name of chosen) {
      for (let i = 0; i < 4; i++) deck.push(name);
    }
    shuffle(deck);

    // Always preload 128px tiles (we scale with CSS, need crisp source)
    const tileDir = 'assets/playtiles/';
    const preloaded = new Map();
    let loaded = 0;
    const total = chosen.length;

    return new Promise((resolve) => {
      for (const name of chosen) {
        const img = new Image();
        img.onload = img.onerror = () => {
          loaded++;
          if (loaded >= total) resolve();
        };
        img.src = tileDir + name;
        preloaded.set(name, img.src);
      }
    }).then(() => {
      loadingEl.style.display = 'none';
      boardEl.innerHTML = '';
      grid = [];
      selected = null;
      isProcessing = false;
      matchCount = 0;
      moves = 0;
      matchCountEl.textContent = '0';

      for (let i = 0; i < 100; i++) {
        const name = deck[i];
        const div = document.createElement('div');
        div.className = 'tile';
        div.dataset.index = i;

        const img = document.createElement('img');
        img.src = preloaded.get(name);
        img.alt = 'cat tile';
        img.draggable = false;
        div.appendChild(img);

        div.addEventListener('click', () => onTileClick(i));

        boardEl.appendChild(div);
        grid.push({ name, el: div, matched: false });
      }
    });
  }

  // ── Click handler ──
  function onTileClick(index) {
    if (isProcessing) return;
    const tile = grid[index];
    if (tile.matched) return;

    if (selected === null) {
      selected = index;
      tile.el.classList.add('selected');
      return;
    }

    if (selected === index) {
      tile.el.classList.remove('selected');
      selected = null;
      return;
    }

    const first = grid[selected];
    const second = tile;
    second.el.classList.add('selected');
    moves++;
    isProcessing = true;

    if (first.name === second.name) {
      playSuccess();

      const c1 = tileCenterViewport(first.el);
      const c2 = tileCenterViewport(second.el);
      spawnBurst(c1.x, c1.y);
      spawnBurst(c2.x, c2.y);

      setTimeout(() => {
        first.el.classList.remove('selected');
        second.el.classList.remove('selected');
        first.el.classList.add('matched');
        second.el.classList.add('matched');
        first.matched = true;
        second.matched = true;

        matchCount++;
        matchCountEl.textContent = matchCount;

        if (matchCount >= 50) {
          setTimeout(() => showWin(), 500);
        }

        selected = null;
        isProcessing = false;
      }, 400);
    } else {
      playFail();

      setTimeout(() => {
        first.el.classList.remove('selected');
        second.el.classList.remove('selected');
        selected = null;
        isProcessing = false;
      }, 600);
    }
  }

  // ── Win screen ──
  function showWin() {
    finalMovesEl.textContent = moves;
    winOverlay.classList.add('show');
  }

  playAgainBtn.addEventListener('click', () => {
    winOverlay.classList.remove('show');
    loadingEl.style.display = 'flex';
    startGame();
  });

  // ── Init ──
  function startGame() {
    fetch('assets/playtiles/tilelist.json')
      .then(r => {
        if (!r.ok) throw new Error('Failed to load tilelist.json');
        return r.json();
      })
      .then(names => {
        if (names.length < 25) {
          throw new Error(`Need at least 25 tiles, found ${names.length}`);
        }
        return buildBoard(names);
      })
      .catch(err => {
        loadingEl.innerHTML = `<div style="color:#e66;">Error: ${err.message}</div>`;
        console.error(err);
      });
  }

  startGame();
})();
</script>
</body>
</html>
